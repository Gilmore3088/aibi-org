name: E2E

on:
  pull_request:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Base URL to run against (defaults to PR preview)'
        required: false

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Smoke tests need no DB seeding; they run against any URL.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Wait for Vercel preview
        if: github.event_name == 'pull_request'
        id: preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
      - name: Run smoke tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.url || inputs.target_url || 'http://localhost:3000' }}
        run: npx playwright test e2e/smoke.spec.ts --project=chromium
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 7

  auth:
    name: Auth flow tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: smoke
    # Auth tests require Supabase service-role access to seed/cleanup
    # users. Skipped on forks (secrets unavailable).
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Wait for Vercel preview
        if: github.event_name == 'pull_request'
        id: preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
      - name: Run auth tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.url || inputs.target_url }}
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROD_PROJECT_REF: ${{ secrets.PROD_SUPABASE_PROJECT_REF }}
        run: npx playwright test e2e/auth.spec.ts
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-auth-report
          path: playwright-report/
          retention-days: 7
